<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Controller</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #2E8B57; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px;}
        
        /* Layout container for side-by-side buttons */
        .button-row { display: flex; flex-direction: row; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        
        button { padding: 15px 40px; font-size: 20px; background: white; color: #2E8B57; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        
        #status { margin-top: 15px; font-size: 1.5rem; opacity: 0.8; font-weight: bold; }
        
        /* Collapsible Section Styling */
        details { background: rgba(255, 255, 255, 0.1); border: 2px solid white; border-radius: 15px; padding: 15px; width: 90%; max-width: 550px; margin-top: 15px; box-sizing: border-box; }
        summary { font-size: 22px; font-weight: bold; cursor: pointer; user-select: none; outline: none; }
        ol { text-align: left; display: inline-block; margin: 15px 0 0 0; padding-left: 25px; font-size: 18px; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>🌿 The Living Library Scanner</h1>
    <p>Keep this tab open while using the Living Library</p>

    <details>
        <summary>Instructions</summary>
        <ol>
            <li>Click on the button "Connect to the Living Library"</li>
            <li>Click on the button "Open the Living Library Website"</li>
        </ol>
    </details>
    
    <div class="button-row">
        <button onclick="startController()">Connect to the Living Library</button>
        <button onclick="openDisplay()" style="background: #1e5d3a; color: white; border: 2px solid white;">Open the Living Library Website</button>
    </div>

    <div id="status">Waiting for connection...</div>

    <script>
        let currentHerb = "home"; 
        let currentLang = "english"; 
        let isReading = false; 

        // --- AUTOMATIC AUTO-CONNECT ON PAGE LOAD ---
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const ports = await navigator.serial.getPorts();
                if (ports.length > 0) {
                    document.getElementById('status').innerText = "🔄 Auto-connecting to known scanner...";
                    await readSerialStream(ports[0]);
                }
            } catch (err) {
                console.log("Auto-connect skipped (Requires initial manual click):", err);
            }
        });

        // --- 1. DISPLAY MANAGEMENT ---
        function openDisplay() {
            window.open("https://sites.google.com/students.edu.sg/the-living-library/home", "LibraryDisplayTab");
            currentHerb = "home";
            currentLang = "english";
            document.getElementById('status').innerText = "Presentation tab opened!";
        }

                currentLang = "chinese";

            } else if (cleanScan.includes("tamil") || cleanScan === "e") {
