<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Living Library Controller</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #2E8B57; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; transition: background-color 0.1s ease; }
        .button-row { display: flex; flex-direction: row; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        button { padding: 15px 40px; font-size: 20px; background: white; color: #2E8B57; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        #status { margin-top: 15px; font-size: 1.8rem; font-weight: bold; background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 10px; min-width: 300px; }
        details { background: rgba(255, 255, 255, 0.1); border: 2px solid white; border-radius: 15px; padding: 15px; width: 90%; max-width: 550px; margin-top: 15px; box-sizing: border-box; }
        summary { font-size: 22px; font-weight: bold; cursor: pointer; user-select: none; }
        ol { text-align: left; display: inline-block; margin: 15px 0 0 0; padding-left: 25px; font-size: 18px; line-height: 1.6; }
        .flash-active { background-color: #1e5d3a !important; }
    </style>
</head>
<body>

    <h1>🌿 The Living Library</h1>
    <p>Keep this tab open while using the Living Library</p>

    <details>
        <summary>Instructions</summary>
        <ol>
            <li>Plug the USB cable into the device</li>
            <li>Click on the button "Connect to the Living Library"</li>
            <li>Click on the button "Open the Living Library Website"</li>
        </ol>
    </details>
    
    <div class="button-row">
        <button onclick="startController()">Connect to the Living Library</button>
        <button onclick="openDisplay()">Open the Living Library Website</button>
    </div>

    <div id="status">Waiting for connection...</div>

    <script>
        let currentHerb = "home"; 
        let currentLang = "english"; 
        let isReading = false; 
        let lastTargetPage = ""; 
        let debounceTimer = null; // STABILIZER: Locks out hardware voltage drops
        
        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {}
        }

        function triggerVisualFlash() {
            document.body.classList.add('flash-active');
            setTimeout(() => { document.body.classList.remove('flash-active'); }, 100);
        }

        function openDisplay() {
            window.open("https://sites.google.com/students.edu.sg/the-living-library/home", "LibraryDisplayTab");
            currentHerb = "home";
            currentLang = "english";
            lastTargetPage = "english"; 
            document.getElementById('status').innerText = "Presentation tab opened!";
        }

        function navigateDisplay(scanResult) {
            const cleanScan = scanResult.replace(/["']/g, "").trim().toLowerCase();

            // Load incoming streams into active tracking registers
            if (cleanScan.includes("english") || cleanScan === "a") currentLang = "english";
            else if (cleanScan.includes("chinese") || cleanScan === "b") currentLang = "chinese";
            else if (cleanScan.includes("malay") || cleanScan === "c") currentLang = "malay";
            else if (cleanScan.includes("tamil") || cleanScan === "e") currentLang = "tamil";
            
            if (cleanScan.includes("laksa")) currentHerb = "laksa";
            else if (cleanScan.includes("pandan")) currentHerb = "pandan";
            else if (cleanScan.includes("wolfberry")) currentHerb = "wolfberry";
            else if (cleanScan.includes("celery")) currentHerb = "celery";
            else if (cleanScan.includes("lemongrass")) currentHerb = "lemongrass";
            else if (cleanScan.includes("home")) currentHerb = "home";

            // --- THE STABILIZER ---
            // If the hardware sags and triggers multiple random language reads in a flash,
            // this drops them and delays execution until the inputs completely stand still.
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                executeFinalNavigation();
            }, 500); // 500ms safety window
        }

        function executeFinalNavigation() {
            const baseUrl = "https://sites.google.com/students.edu.sg/the-living-library/";
            let targetPage = "";

            if (currentLang === "english") {
                if (currentHerb === "home") targetPage = "english";
                else if (currentHerb === "laksa") targetPage = "english/laksa-leaf";
                else if (currentHerb === "pandan") targetPage = "english/pandan-leaf";
                else if (currentHerb === "wolfberry") targetPage = "english/wolfberry-leaf";
                else if (currentHerb === "celery") targetPage = "english/chinese-celery";
                else if (currentHerb === "lemongrass") targetPage = "english/lemongrass";
            } 
            else if (currentLang === "chinese") {
                if (currentHerb === "home") targetPage = "%E4%B8%AD%E6%96%87"; 
                else if (currentHerb === "laksa") targetPage = "%E4%B8%AD%E6%96%87/%E5%8F%BB%E6%B2%99%E5%8F%B6";
                else if (currentHerb === "pandan") targetPage = "%E4%B8%AD%E6%96%87/%E6%96%91%E5%85%B0%E5%8F%B6";
                else if (currentHerb === "wolfberry") targetPage = "%E4%B8%AD%E6%96%87/%E6%9E%B8%E6%9D%9E%E5%8F%B6";
                else if (currentHerb === "celery") targetPage = "%E4%B8%AD%E6%96%87/%E8%8A%B9%E8%8F%9C";
                else if (currentHerb === "lemongrass") targetPage = "%E4%B8%AD%E6%96%87/%E9%A6%99%E8%8C%85";
            } 
            else if (currentLang === "malay") {
                if (currentHerb === "home") targetPage = "bahasa-melayu"; 
                else if (currentHerb === "laksa") targetPage = "bahasa-melayu/daun-laksa";
                else if (currentHerb === "pandan") targetPage = "bahasa-melayu/daun-pandan";
                else if (currentHerb === "wolfberry") targetPage = "bahasa-melayu/daun-goji";
                else if (currentHerb === "celery") targetPage = "bahasa-melayu/saderi-cina";
                else if (currentHerb === "lemongrass") targetPage = "bahasa-melayu/serai-lemongrass";
            } 
            else if (currentLang === "tamil") {
                if (currentHerb === "home") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4"; 
                else if (currentHerb === "laksa") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%85%E0%AE%A9%E0%AE%9A%E0%AE%9A-%E0%AE%87%E0%AE%B2laksa-leaf";
                else if (currentHerb === "pandan") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%AA%E0%AE%A3%E0%AE%9F%E0%AE%A9-%E0%AE%87%E0%AE%B2pandan-leaf";
                else if (currentHerb === "wolfberry") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%95%E0%AE%9C-%E0%AE%87%E0%AE%B2wolfberry";
                else if (currentHerb === "celery") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%9A%E0%AE%A9-%E0%AE%9A%E0%AE%B2%E0%AE%B0chinese-celery";
                else if (currentHerb === "lemongrass") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%87%E0%AE%9E%E0%AE%9A-%E0%AE%AA%E0%AE%B2lemongrass";
            }

            if (targetPage === lastTargetPage) return; 

            lastTargetPage = targetPage; 
            console.log(`🎯 Voltage Stabilized. Opening real tab: ${targetPage}`);
            
            playBeep();
            triggerVisualFlash();

            const statusEl = document.getElementById('status');
            if (statusEl) {
                statusEl.innerText = `🌿 Live: ${currentHerb.toUpperCase()} (${currentLang.toUpperCase()})`;
            }

            window.open(baseUrl + targetPage, "LibraryDisplayTab");
        }

        async function startController() {
            if (isReading) return;
            try {
                let port;
                const ports = await navigator.serial.getPorts();
                if (ports.length > 0) port = ports[0]; 
                else port = await navigator.serial.requestPort();
                
                isReading = true;
                await port.open({ baudRate: 115200 });
                document.getElementById('status').innerText = "✅ Connected! Listening...";
                
                const textDecoder = new TextDecoderStream();
                port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();
                let incomingData = "";
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    incomingData += value;
                    let lines = incomingData.split("\n");
                    incomingData = lines.pop(); 
                    
                    for (let line of lines) {
                        if (line.trim()) {
                            navigateDisplay(line); 
                        }
                    }
                }
            } catch (err) {
                isReading = false;
                document.getElementById('status').innerText = "❌ Connection failed. Replug USB.";
            }
        }
    </script>
</body>
</html>
