<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Living Library | Kiosk Controller</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; background-color: #2E8B57; color: white; 
            font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; 
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        .instructions { 
            background: rgba(255,255,255,0.15); padding: 25px; border-radius: 20px; 
            width: 80%; max-width: 600px; text-align: left; margin-bottom: 30px; 
        }
        .btn-group { display: flex; gap: 20px; margin-top: 10px; }
        button { 
            padding: 15px 30px; font-size: 18px; background: white; color: #2E8B57; 
            border: none; border-radius: 40px; cursor: pointer; font-weight: bold; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s; 
        }
        button:hover { transform: scale(1.05); background: #f0f0f0; }
        #status { margin-top: 30px; font-size: 1.2rem; padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h1>🌿 The Living Library</h1>
    
    <div class="instructions">
        <h3>How to operate:</h3>
        <ol>
            <li>Ensure the Scanner is plugged into the laptop USB port.</li>
            <li>Click "Connect to the Living Library".</li>
            <li>Click "Launch the Living Library Website".</li>
            <li>Follow the library website tabs.</li>
        </ol>
    </div>

    <div class="btn-group">
        <button onclick="startController()">Connect to the Living Library</button>
        <button onclick="openDisplay()">Launch the Living Library Website</button>
    </div>

    <div id="status">Waiting for connection...</div>

    <script>
        let currentHerb = "home"; 
        let currentLang = "english"; 

        const paths = {
            english: { home: "english", laksa: "english/laksa-leaf", pandan: "english/pandan-leaf", wolfberry: "english/wolfberry-leaf", celery: "english/chinese-celery", lemongrass: "english/lemongrass" },
            chinese: { home: "%E4%B8%AD%E6%96%87", laksa: "%E4%B8%AD%E6%96%87/%E5%8F%BB%E6%B2%99%E5%8F%B6", pandan: "%E4%B8%AD%E6%96%87/%E6%96%91%E5%85%B0%E5%8F%B6", wolfberry: "%E4%B8%AD%E6%96%87/%E6%9E%B8%E6%9D%9E%E5%8F%B6", celery: "%E4%B8%AD%E6%96%87/%E8%8A%B9%E8%8F%9C", lemongrass: "%E4%B8%AD%E6%96%87/%E9%A6%99%E8%8C%85" },
            malay: { home: "bahasa-melayu", laksa: "bahasa-melayu/daun-laksa", pandan: "bahasa-melayu/daun-pandan", wolfberry: "bahasa-melayu/daun-goji", celery: "bahasa-melayu/saderi-cina", lemongrass: "bahasa-melayu/serai-lemongrass" },
            tamil: { home: "%E0%AE%A4%E0%AE%AE%E0%AE%B4", laksa: "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%85%E0%AE%A9%E0%AE%9A%E0%AE%9A-%E0%AE%87%E0%AE%B2laksa-leaf", pandan: "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%AA%E0%AE%A3%E0%AE%9F%E0%AE%A9-%E0%AE%87%E0%AE%B2pandan-leaf", wolfberry: "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%95%E0%AE%9C-%E0%AE%87%E0%AE%B2wolfberry", celery: "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%9A%E0%AE%A9-%E0%AE%9A%E0%AE%B2%E0%AE%B0chinese-celery", lemongrass: "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%87%E0%AE%9E%E0%AE%9A-%E0%AE%AA%E0%AE%B2lemongrass" }
        };

        function openDisplay() {
            window.open("https://sites.google.com/students.edu.sg/the-living-library/", "LibraryDisplayTab");
            currentHerb = "home";
            currentLang = "english";
            document.getElementById('status').innerText = "Presentation tab launched!";
        }

        function navigateDisplay(scanResult) {
            const input = scanResult.trim().toLowerCase();
            if (input === "") return;
            
            document.getElementById('status').innerText = "Heard: " + input;
            const baseUrl = "https://sites.google.com/students.edu.sg/the-living-library/";
            
            // EXCLUSIVE CHECK: Detect Language
            if (input.includes("english")) currentLang = "english";
            else if (input.includes("chinese")) currentLang = "chinese";
            else if (input.includes("malay")) currentLang = "malay";
            else if (input.includes("tamil")) currentLang = "tamil";
            
            // EXCLUSIVE CHECK: Detect Herb (Only triggers if one of these is found)
            if (input.includes("laksa")) currentHerb = "laksa";
            else if (input.includes("pandan")) currentHerb = "pandan";
            else if (input.includes("wolfberry")) currentHerb = "wolfberry";
            else if (input.includes("celery")) currentHerb = "celery";
            else if (input.includes("lemongrass")) currentHerb = "lemongrass";
            else if (input.includes("home")) currentHerb = "home";

            let targetPage = paths[currentLang][currentHerb];

            if (targetPage) {
                window.open(baseUrl + targetPage, "LibraryDisplayTab");
                document.getElementById('status').innerText = `Active: ${currentHerb} (${currentLang})`;
            }
        }

        async function startController() {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('status').innerText = "✅ System Online";
                
                const reader = port.readable.getReader();
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const text = new TextDecoder().decode(value);
                    if (text.trim().length > 0) {
                        navigateDisplay(text);
                    }
                }
            } catch (err) {
                document.getElementById('status').innerText = "❌ Error: " + err.message;
            }
        }
    </script>
</body>
</html>
