<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N2ICBeta Hardware Diagnostics</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: monospace; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #4CAF50; }
        button { padding: 15px 30px; font-size: 18px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        #status { font-size: 1.2rem; color: #ffeb3b; margin-bottom: 30px; }
        
        /* Dashboard Grid */
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 900px; margin: 0 auto; }
        .card { background: #333; border: 2px solid #555; border-radius: 10px; width: 150px; padding: 20px; transition: 0.1s; }
        .card h2 { margin: 0; font-size: 24px; color: #ccc; }
        .card p { font-size: 40px; margin: 10px 0 0 0; font-weight: bold; color: white; }
        
        /* Flash Animation Classes */
        .flash-success { background: #4CAF50 !important; border-color: #81c784 !important; transform: scale(1.1); }
        .flash-camera { background: #2196F3 !important; border-color: #64b5f6 !important; transform: scale(1.1); }
        
        /* Raw Log Area */
        .log-box { margin-top: 40px; background: #000; border: 1px solid #444; padding: 15px; height: 200px; overflow-y: auto; text-align: left; font-size: 14px; color: #0f0; max-width: 900px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <h1>🔧 Hardware Diagnostic Tester</h1>
    <p>Test button consistency. Google Sites is disabled for this test.</p>

    <button onclick="startController()">🔌 Connect Micro:bit</button>
    <div id="status">Status: Disconnected</div>

    <div class="grid">
        <div class="card" id="card-english"><h2>A (Eng)</h2><p id="count-english">0</p></div>
        <div class="card" id="card-chinese"><h2>B (Chi)</h2><p id="count-chinese">0</p></div>
        <div class="card" id="card-malay"><h2>C (Mal)</h2><p id="count-malay">0</p></div>
        <div class="card" id="card-tamil"><h2>E (Tam)</h2><p id="count-tamil">0</p></div>
        <div class="card" id="card-camera"><h2>D (Scan)</h2><p id="count-camera">0</p></div>
    </div>

    <div class="log-box" id="terminal">
        > Terminal ready... waiting for hardware.<br>
    </div>

    <script>
        // Track counts
        let counts = { english: 0, chinese: 0, malay: 0, tamil: 0, camera: 0 };

        function logToTerminal(msg, isRaw = false) {
            const term = document.getElementById('terminal');
            const time = new Date().toLocaleTimeString().split(' ')[0];
            const color = isRaw ? '#888' : '#0f0';
            term.innerHTML += `<span style="color:${color}">[${time}] ${msg}</span><br>`;
            term.scrollTop = term.scrollHeight; // Auto-scroll
        }

        function triggerUI(id, type) {
            // Update Number
            counts[id]++;
            document.getElementById(`count-${id}`).innerText = counts[id];
            
            // Flash Card
            const card = document.getElementById(`card-${id}`);
            const flashClass = type === 'lang' ? 'flash-success' : 'flash-camera';
            card.classList.add(flashClass);
            setTimeout(() => card.classList.remove(flashClass), 150);
        }

        function processSignal(scanResult) {
            const cleanScan = scanResult.replace(/["']/g, "").trim().toLowerCase();
            if (!cleanScan) return;

            logToTerminal(`Parsed Signal -> "${cleanScan}"`);

            // Language Buttons (Keys A, B, C, E)
            if (cleanScan.includes("eng") || cleanScan === "a") triggerUI('english', 'lang');
            else if (cleanScan.includes("chi") || cleanScan.includes("chn") || cleanScan === "b") triggerUI('chinese', 'lang');
            else if (cleanScan.includes("mal") || cleanScan === "c") triggerUI('malay', 'lang');
            else if (cleanScan.includes("tam") || cleanScan === "e") triggerUI('tamil', 'lang');
            
            // Camera Scan (Key D)
            else if (cleanScan.includes("lak") || cleanScan.includes("pan") || cleanScan.includes("wol") || cleanScan.includes("cel") || cleanScan.includes("fce") || cleanScan.includes("lem") || cleanScan.includes("grass") || cleanScan.includes("hom")) {
                triggerUI('camera', 'scan');
            } 
            else {
                logToTerminal(`⚠️ Unknown noise dropped: "${cleanScan}"`, true);
            }
        }

        async function startController() {
            try {
                let port;
                const ports = await navigator.serial.getPorts();
                if (ports.length > 0) port = ports[0]; 
                else port = await navigator.serial.requestPort();

                await port.open({ baudRate: 115200 });
                document.getElementById('status').innerText = "Status: 🟢 Connected & Live";
                document.getElementById('status').style.color = "#4CAF50";
                
                const textDecoder = new TextDecoderStream();
                port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();
                let incomingData = "";
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    incomingData += value;
                    logToTerminal(`Raw Bytes: ${value.replace(/\n/g, '\\n')}`, true);
                    
                    if (incomingData.includes('\n')) {
                        let lines = incomingData.split('\n');
                        incomingData = lines.pop(); 
                        
                        for (let line of lines) {
                            if (line.trim()) processSignal(line);
                        }
                    }
                }
            } catch (err) {
                document.getElementById('status').innerText = "Status: 🔴 Connection Failed / Port Busy";
                document.getElementById('status').style.color = "#f44336";
            }
        }
    </script>
</body>
</html>
