<html lang="en">
<head>

    <title>Scanner Controller</title>

        #status { margin-top: 20px; font-size: 1.5rem; opacity: 0.8; font-weight: bold; }

    <p>Keep this tab open in the background to listen to the hardware.</p>

    <div class="box">
        <h3>1. REAL HARDWARE</h3>
        <button onclick="startController()">Connect Physical Scanner (USB)</button>
        <div id="status">Waiting for connection...</div>
    </div>
    
    <br>
    <button onclick="openDisplay()" style="background: #1e5d3a; color: white; border: 2px solid white;">Open Presentation Tab</button>

    <script>
        let currentHerb = "home"; 
        let currentLang = "english"; 

        function openDisplay() {
            window.open("https://sites.google.com/students.edu.sg/the-living-library/view-herbs", "LibraryDisplayTab");
            currentHerb = "home";
            currentLang = "english";
            document.getElementById('status').innerText = "Presentation tab opened!";
        }

        function navigateDisplay(scanResult) {
            // Force clean lowercase conversion to fix casing mismatches
            const cleanScan = scanResult.replace(/["']/g, "").trim().toLowerCase();
            if (!cleanScan) return;

            console.log("👉 Matcher analyzing string:", cleanScan);

            if (cleanScan.includes("eng") || cleanScan === "a") {
                currentLang = "english";
            } else if (cleanScan.includes("chi") || cleanScan === "b") {
                currentLang = "chinese";
            } else if (cleanScan.includes("mal") || cleanScan === "c") {
                currentLang = "malay";
            } else if (cleanScan.includes("tam") || cleanScan === "e") {
                currentLang = "tamil";
            } 
            // Match herb string fragments safely
            else if (cleanScan.includes("lak")) {
                currentHerb = "laksa";
            } else if (cleanScan.includes("pan")) {
                currentHerb = "pandan";
            } else if (cleanScan.includes("wol")) {
                currentHerb = "wolfberry"; 
            } else if (cleanScan.includes("cel") || cleanScan.includes("fce")) {
                currentHerb = "celery";
            } else if (cleanScan.includes("lem") || cleanScan.includes("grass")) {
                currentHerb = "lemongrass";
            } else if (cleanScan.includes("hom")) {
                currentHerb = "home";
            } else {
                console.log("⚠️ String recognized as unmapped noise:", cleanScan);
