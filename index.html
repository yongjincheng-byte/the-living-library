<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Controller</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #2E8B57; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px;}
        button { padding: 15px 40px; margin: 10px; font-size: 20px; background: white; color: #2E8B57; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        #status { margin-top: 20px; font-size: 1.5rem; opacity: 0.8; font-weight: bold; }
        .box { border: 2px solid white; padding: 20px; border-radius: 15px; margin-top: 20px; background: rgba(255,255,255,0.1); width: 80%; max-width: 600px; }
        video { width: 100%; max-width: 400px; border-radius: 10px; border: 3px solid white; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <h1>🌿 The Living Library Scanner</h1>
    <p>Keep this tab open in the background to listen to the hardware.</p>

    <div class="box">
        <h3>1. REAL HARDWARE</h3>
        <button onclick="startController()">Connect Physical Scanner (USB)</button>
        <div id="status">Waiting for connection...</div>
    </div>

    <div class="box">
        <h3>2. LIVE CAMERA ILLUSION</h3>
        <button onclick="startWebcam()" style="font-size: 16px; padding: 10px 20px;">Turn on Laptop Camera</button>
        <br>
        <video id="webcam" autoplay playsinline></video>
    </div>
    
    <br>
    <button onclick="openDisplay()" style="background: #1e5d3a; color: white; border: 2px solid white;">Open Presentation Tab</button>

    <script>
        function openDisplay() {
            window.open("https://sites.google.com/students.edu.sg/the-living-library/english", "LibraryDisplayTab");
        }

        function navigateDisplay(scanResult) {
            // Updated to match your folder structure: /english/
            const baseUrl = "https://sites.google.com/students.edu.sg/the-living-library/english/";
            let targetPage = "";
            const cleanScan = scanResult.trim().toLowerCase();

            if (cleanScan.includes("laksa")) targetPage = "laksa-leaf";
            else if (cleanScan.includes("pandan")) targetPage = "pandan-leaf";
            else if (cleanScan.includes("wolfberry")) targetPage = "wolfberry-leaf";
            else if (cleanScan.includes("celery")) targetPage = "chinese-celery";
            else if (cleanScan.includes("lemongrass")) targetPage = "lemongrass";

            if (targetPage !== "") {
                const fullUrl = baseUrl + targetPage;
                console.log("Navigating to: " + fullUrl);
                window.open(fullUrl, "LibraryDisplayTab");
                document.getElementById('status').innerText = "Last scanned: " + targetPage;
            }
        }

        async function startController() {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('status').innerText = "✅ Connected!";
                
                const reader = port.readable.getReader();
                let incomingData = "";
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    incomingData += new TextDecoder().decode(value);
                    if (incomingData.includes('\n')) {
                        navigateDisplay(incomingData); 
                        incomingData = ""; 
                    }
                }
            } catch (err) {
                document.getElementById('status').innerText = "❌ Error: " + err.message;
            }
        }

        function startWebcam() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    const v = document.getElementById('webcam');
                    v.style.display = "block";
                    v.srcObject = stream;
                });
        }
    </script>
</body>
</html>
