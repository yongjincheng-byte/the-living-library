<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Living Library | Kiosk Controller</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; background-color: #2E8B57; color: white; 
            font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; 
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        .instructions { 
            background: rgba(255,255,255,0.15); padding: 25px; border-radius: 20px; 
            width: 80%; max-width: 600px; text-align: left; margin-bottom: 30px; 
        }
        .btn-group { display: flex; gap: 20px; margin-top: 10px; }
        button { 
            padding: 15px 30px; font-size: 18px; background: white; color: #2E8B57; 
            border: none; border-radius: 40px; cursor: pointer; font-weight: bold; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s; 
        }
        button:hover { transform: scale(1.05); background: #f0f0f0; }
        #status { margin-top: 30px; font-size: 1.2rem; padding: 15px; border-radius: 10px; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h1>🌿 The Living Library</h1>
    
    <div class="instructions">
        <h3>How to operate:</h3>
        <ol>
            <li>Ensure the Scanner is plugged into the laptop USB port.</li>
            <li>Click "Connect Scanner" to initialize the hardware.</li>
            <li>Click "Launch Kiosk" to open the display tab.</li>
            <li>Follow the instructions provided in the following websites.</li>
        </ol>
    </div>

    <div class="btn-group">
        <button onclick="startController()">Connect Scanner</button>
        <button onclick="openDisplay()">Launch Kiosk</button>
    </div>

    <div id="status">Waiting for connection...</div>

    <script>
        let currentHerb = "home"; 
        let currentLang = "english"; 

        function openDisplay() {
            const homeUrl = "https://sites.google.com/students.edu.sg/the-living-library/";
            window.open(homeUrl, "LibraryDisplayTab");
            currentHerb = "home";
            document.getElementById('status').innerText = "Presentation tab launched at Home!";
        }

        function navigateDisplay(scanResult) {
            const scanLower = scanResult.toLowerCase();

            // 1. Update states
            if (scanLower.includes("english")) currentLang = "english";
            else if (scanLower.includes("chinese")) currentLang = "chinese";
            else if (scanLower.includes("malay")) currentLang = "malay";
            else if (scanLower.includes("tamil")) currentLang = "tamil";
            else if (scanLower.includes("laksa")) currentHerb = "laksa";
            else if (scanLower.includes("pandan")) currentHerb = "pandan";
            else if (scanLower.includes("wolfberry")) currentHerb = "wolfberry";
            else if (scanLower.includes("celery")) currentHerb = "celery";
            else if (scanLower.includes("lemongrass")) currentHerb = "lemongrass";
            else if (scanLower.includes("home")) currentHerb = "home";

            const baseUrl = "https://sites.google.com/students.edu.sg/the-living-library/";
            let targetPage = "";

            // 2. Logic for Home Page Language Switch
            if (currentHerb === "home") {
                if (currentLang === "english") targetPage = "";
                else if (currentLang === "chinese") targetPage = "%E4%B8%AD%E6%96%87";
                else if (currentLang === "malay") targetPage = "bahasa-melayu";
                else if (currentLang === "tamil") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4";
            } 
            // 3. Logic for Herb Pages
            else if (currentLang === "english") {
                if (currentHerb === "laksa") targetPage = "english/laksa-leaf";
                else if (currentHerb === "pandan") targetPage = "english/pandan-leaf";
                else if (currentHerb === "wolfberry") targetPage = "english/wolfberry-leaf";
                else if (currentHerb === "celery") targetPage = "english/chinese-celery";
                else if (currentHerb === "lemongrass") targetPage = "english/lemongrass";
            }

            window.open(baseUrl + targetPage, "LibraryDisplayTab");
            document.getElementById('status').innerText = `Active: ${currentHerb} in ${currentLang}`;
        }

        async function startController() {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('status').innerText = "✅ System Online";
                
                const reader = port.readable.getReader();
                let incomingData = "";
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    incomingData += new TextDecoder().decode(value);
                    if (incomingData.includes('\n')) {
                        navigateDisplay(incomingData); 
                        incomingData = ""; 
                    }
                }
            } catch (err) {
                document.getElementById('status').innerText = "❌ Connection Error";
            }
        }
    </script>
</body>
</html>
