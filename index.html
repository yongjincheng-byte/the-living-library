<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Controller</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #2E8B57; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px;}
        button { padding: 15px 40px; margin: 10px; font-size: 20px; background: white; color: #2E8B57; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        #status { margin-top: 20px; font-size: 1.5rem; opacity: 0.8; font-weight: bold; }
        .box { border: 2px solid white; padding: 20px; border-radius: 15px; margin-top: 20px; background: rgba(255,255,255,0.1); width: 80%; max-width: 600px; }
        video { width: 100%; max-width: 400px; border-radius: 10px; border: 3px solid white; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <h1>🌿 The Living Library</h1>
    <p>Keep this tab open in the background to listen to the hardware.</p>

    <div class="box">
        <h3>1. REAL HARDWARE</h3>
        <button onclick="startController()">Connect Physical Scanner (USB)</button>
        <div id="status">Waiting for connection...</div>
    </div>

    <div class="box">
        <h3>2. LIVE CAMERA ILLUSION (Optional)</h3>
        <button onclick="startWebcam()" style="font-size: 16px; padding: 10px 20px;">Turn on Laptop Camera</button>
        <br>
        <video id="webcam" autoplay playsinline></video>
    </div>
    
    <br>
    <button onclick="openDisplay()" style="background: #1e5d3a; color: white; border: 2px solid white;">Open Presentation Tab</button>

    <script>
        // --- 1. CORE STATE VARIABLES (Layered over your original layout) ---
        let currentHerb = "home"; 
        let currentLang = "english"; 
        let lastTargetPage = ""; 

        function openDisplay() {
            window.open("https://sites.google.com/students.edu.sg/the-living-library/view-herbs", "LibraryDisplayTab");
            currentHerb = "home";
            currentLang = "english";
            lastTargetPage = "";
            document.getElementById('status').innerText = "Presentation tab opened!";
        }

        function navigateDisplay(scanResult) {
            const cleanScan = scanResult.replace(/["']/g, "").trim().toLowerCase();
            console.log("Hardware input received:", cleanScan);

            let stateChanged = false;

            // Step A: Parse Language buttons from the ADKeyboard (Keys A, B, C, E)
            if (cleanScan.includes("english") || cleanScan === "a") {
                if (currentLang !== "english") { currentLang = "english"; stateChanged = true; }
            } else if (cleanScan.includes("chinese") || cleanScan === "b") {
                if (currentLang !== "chinese") { currentLang = "chinese"; stateChanged = true; }
            } else if (cleanScan.includes("malay") || cleanScan === "c") {
                if (currentLang !== "malay") { currentLang = "malay"; stateChanged = true; }
            } else if (cleanScan.includes("tamil") || cleanScan === "e") {
                if (currentLang !== "tamil") { currentLang = "tamil"; stateChanged = true; }
            } 
            
            // Step B: Parse Herb classification from the HuskyLens (Triggered via Key D)
            else if (cleanScan.includes("laksa")) {
                if (currentHerb !== "laksa") { currentHerb = "laksa"; stateChanged = true; }
            } else if (cleanScan.includes("pandan")) {
                if (currentHerb !== "pandan") { currentHerb = "pandan"; stateChanged = true; }
            } else if (cleanScan.includes("wolfberry")) {
                if (currentHerb !== "wolfberry") { currentHerb = "wolfberry"; stateChanged = true; }
            } else if (cleanScan.includes("celery")) {
                if (currentHerb !== "celery") { currentHerb = "celery"; stateChanged = true; }
            } else if (cleanScan.includes("lemongrass")) {
                if (currentHerb !== "lemongrass") { currentHerb = "lemongrass"; stateChanged = true; }
            } else if (cleanScan.includes("home")) {
                if (currentHerb !== "home") { currentHerb = "home"; stateChanged = true; }
            } else {
                return; // Silently drop noise or partial words
            }

            // Break execution if no new structural state change has occurred 
            if (!stateChanged) return;

            // Step C: Construct URLs cleanly using safe directory path rules
            const baseUrl = "https://sites.google.com/students.edu.sg/the-living-library/";
            let targetPage = "";

            if (currentLang === "english") {
                if (currentHerb === "home") targetPage = "english";
                else if (currentHerb === "laksa") targetPage = "english/laksa-leaf";
                else if (currentHerb === "pandan") targetPage = "english/pandan-leaf";
                else if (currentHerb === "wolfberry") targetPage = "english/wolfberry-leaf";
                else if (currentHerb === "celery") targetPage = "english/chinese-celery";
                else if (currentHerb === "lemongrass") targetPage = "english/lemongrass";
            } 
            else if (currentLang === "chinese") {
                if (currentHerb === "home") targetPage = "%E4%B8%AD%E6%96%87"; 
                else if (currentHerb === "laksa") targetPage = "%E4%B8%AD%E6%96%87/%E5%8F%BB%E6%B2%99%E5%8F%B6";
                else if (currentHerb === "pandan") targetPage = "%E4%B8%AD%E6%96%87/%E6%96%91%E5%85%B0%E5%8F%B6";
                else if (currentHerb === "wolfberry") targetPage = "%E4%B8%AD%E6%96%87/%E6%9E%B8%E6%9D%9E%E5%8F%B6";
                else if (currentHerb === "celery") targetPage = "%E4%B8%AD%E6%96%87/%E8%8A%B9%E8%8F%9C";
                else if (currentHerb === "lemongrass") targetPage = "%E4%B8%AD%E6%96%87/%E9%A6%99%E8%8C%85";
            } 
            else if (currentLang === "malay") {
                if (currentHerb === "home") targetPage = "bahasa-melayu"; 
                else if (currentHerb === "laksa") targetPage = "bahasa-melayu/daun-laksa";
                else if (currentHerb === "pandan") targetPage = "bahasa-melayu/daun-pandan";
                else if (currentHerb === "wolfberry") targetPage = "bahasa-melayu/daun-goji";
                else if (currentHerb === "celery") targetPage = "bahasa-melayu/saderi-cina";
                else if (currentHerb === "lemongrass") targetPage = "bahasa-melayu/serai-lemongrass";
            } 
            else if (currentLang === "tamil") {
                if (currentHerb === "home") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4"; 
                else if (currentHerb === "laksa") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%85%E0%AE%A9%E0%AE%9A%E0%AE%9A-%E0%AE%87%E0%AE%B2laksa-leaf";
                else if (currentHerb === "pandan") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%AA%E0%AE%A3%E0%AE%9F%E0%AE%A9-%E0%AE%87%E0%AE%B2pandan-leaf";
                else if (currentHerb === "wolfberry") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%95%E0%AE%9C-%E0%AE%87%E0%AE%B2wolfberry";
                else if (currentHerb === "celery") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%9A%E0%AE%A9-%E0%AE%9A%E0%AE%B2%E0%AE%B0chinese-celery";
                else if (currentHerb === "lemongrass") targetPage = "%E0%AE%A4%E0%AE%AE%E0%AE%B4/%E0%AE%87%E0%AE%9E%E0%AE%9A-%E0%AE%AA%E0%AE%B2lemongrass";
            }

            // Fallback safety gate 
            if (targetPage === "" || targetPage === lastTargetPage) return;
            lastTargetPage = targetPage;

            // Open tab natively just like your old operational prototype
            window.open(baseUrl + targetPage, "LibraryDisplayTab");
            document.getElementById('status').innerText = `🌿 Active: ${currentHerb.toUpperCase()} (${currentLang.toUpperCase()})`;
        }

        // --- 2. SERIAL HARDWARE ROUTINES ---
        async function startController() {
            if (isReading) return;
            try {
                let port;
                const ports = await navigator.serial.getPorts();
                if (ports.length > 0) {
                    port = ports[0]; 
                    document.getElementById('status').innerText = "🔄 Re-connecting to scanner...";
                } else {
                    port = await navigator.serial.requestPort();
                }

                await port.open({ baudRate: 115200 });
                isReading = true;
                document.getElementById('status').innerText = "✅ Scanner Connected! Listening...";
                
                const textDecoder = new TextDecoderStream();
                port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();
                
                let incomingData = "";
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    incomingData += value;
                    let lines = incomingData.split("\n");
                    incomingData = lines.pop(); 
                    
                    for (let line of lines) {
                        if (line.trim()) {
                            navigateDisplay(line); 
                        }
                    }
                }
            } catch (err) {
                isReading = false;
                document.getElementById('status').innerText = "❌ Connection failed. Check USB cable connection.";
            }
        }

        // --- 3. LIVE CAMERA BOX ILLUSION ---
        function startWebcam() {
            const videoElement = document.getElementById('webcam');
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    videoElement.style.display = "block"; 
                    videoElement.srcObject = stream;
                })
                .catch(function(err) {
                    alert("Could not initialize webcam window.");
                });
        }
    </script>
</body>
</html>
